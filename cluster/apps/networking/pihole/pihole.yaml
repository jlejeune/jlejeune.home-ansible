---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pihole
  namespace: networking
data:
  TZ: "${TZ}"
  ADMIN_EMAIL: "${SECRET_EMAIL}"
  PIHOLE_DNS_: "${NAS_ADDRESS}"
  QUERY_LOGGING: "false"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-pvc
  namespace: networking
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 500Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pihole
  namespace: networking
  labels:
    app.kubernetes.io/instance: pihole
spec:
  serviceName: pihole
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: pihole
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2022.05
          envFrom:
            - configMapRef:
                name: pihole
            - secretRef:
                name: pihole
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            limits:
              memory: 300Mi
              cpu: 250m
            requests:
              memory: 50Mi
              cpu: 100m
          volumeMounts:
            - mountPath: /etc/pihole
              name: pihole-etc
          livenessProbe:
            httpGet:
              path: /admin.index.php
              port: http
            initialDelaySeconds: 60
            failureThreshold: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /admin.index.php
              port: http
            initialDelaySeconds: 60
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: pihole-etc
          persistentVolumeClaim:
            claimName: pihole-pvc
---
kind: Service
apiVersion: v1
metadata:
  name: pihole-dns-tcp
  namespace: networking
  annotations:
    metallb.universe.tf/allow-shared-ip: pihole
spec:
  selector:
    app.kubernetes.io/instance: pihole
  type: LoadBalancer
  loadBalancerIP: "${LB_PIHOLE_ADDRESS}"
  externalTrafficPolicy: Local
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns-udp
  namespace: networking
  annotations:
    metallb.universe.tf/allow-shared-ip: pihole
spec:
  selector:
    app.kubernetes.io/instance: pihole
  type: LoadBalancer
  loadBalancerIP: "${LB_PIHOLE_ADDRESS}"
  externalTrafficPolicy: Local
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
---
kind: Service
apiVersion: v1
metadata:
  name: pihole-dashboard
  namespace: networking
spec:
  selector:
    app.kubernetes.io/instance: pihole
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: pihole
  namespace: networking
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: "Host(`pihole.${SECRET_DOMAIN}`) && PathPrefix(`/admin`)"
      middlewares:
        - name: security-header
          namespace: networking
      services:
        - kind: Service
          name: pihole-dashboard
          namespace: networking
          port: 80
          scheme: https
  tls:
    secretName: "${SECRET_DOMAIN}-tls"
