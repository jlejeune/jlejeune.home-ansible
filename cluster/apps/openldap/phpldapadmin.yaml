---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpldapadmin
  namespace: openldap
  labels:
    app.kubernetes.io/instance: phpldapadmin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: phpldapadmin
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: phpldapadmin
    spec:
      containers:
        - name: phpldapadmin
          image: osixia/phpldapadmin:0.9.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PHPLDAPADMIN_HTTPS
              value: "false"
          envFrom:
            - secretRef:
                name: ldap-admin-secret
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: phpldapadmin
  namespace: openldap
spec:
  selector:
    app.kubernetes.io/instance: phpldapadmin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
